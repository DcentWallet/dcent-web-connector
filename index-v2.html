<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D'CENT Connector v2 Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Sticky Header (Device Indicator) ── */
    #header {
      background: #1e1e2e;
      color: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #header h1 { font-size: 16px; font-weight: 600; flex: 1; }
    #conn-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    #conn-dot.connected { background: #4ade80; }
    #conn-dot.error { background: #f87171; }
    #device-info { font-size: 12px; color: #aaa; flex: 1; }
    #btn-connect, #btn-disconnect {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    #btn-connect { background: #4f46e5; color: #fff; }
    #btn-connect:hover { background: #4338ca; }
    #btn-connect:disabled { background: #666; cursor: not-allowed; }
    #btn-disconnect { background: #dc2626; color: #fff; display: none; }
    #btn-disconnect:hover { background: #b91c1c; }

    /* ── Main layout: sidebar + log panel ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left sidebar: tree + form ── */
    #sidebar {
      width: 300px;
      min-width: 200px;
      background: #fff;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Tree */
    #tree-panel {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .tree-group-label {
      padding: 6px 12px 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
    }
    .tree-family-label {
      padding: 4px 16px 2px;
      font-size: 11px;
      color: #aaa;
      font-style: italic;
    }
    .tree-item {
      padding: 7px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
      font-size: 13px;
    }
    .tree-item:hover { background: #f5f5f5; }
    .tree-item.selected {
      background: #eef2ff;
      border-left-color: #4f46e5;
      color: #4f46e5;
      font-weight: 600;
    }

    /* Form (bottom of sidebar) */
    #form-panel {
      border-top: 1px solid #e5e5e5;
      padding: 12px;
      flex-shrink: 0;
      max-height: 340px;
      overflow-y: auto;
    }
    #form-panel h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 10px;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
    }
    .form-row label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin-bottom: 3px;
    }
    .form-row input,
    .form-row select,
    .form-row textarea {
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }
    .form-row textarea { resize: vertical; min-height: 60px; }
    .form-row input:read-only { background: #f5f5f5; color: #888; }
    .form-row input.error { border-color: #dc2626; }
    .field-error {
      font-size: 11px;
      color: #dc2626;
      margin-top: 2px;
    }
    #btn-send {
      width: 100%;
      padding: 8px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
    }
    #btn-send:hover { background: #4338ca; }
    #btn-send:disabled { background: #9ca3af; cursor: not-allowed; }

    /* ── Right: Log panel ── */
    #log-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1a1a2e;
    }
    #log-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #log-toolbar span {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 600;
      flex: 1;
    }
    #log-toolbar button {
      padding: 4px 10px;
      border: 1px solid #334155;
      border-radius: 4px;
      background: #1e293b;
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
    }
    #log-toolbar button:hover { background: #334155; color: #e2e8f0; }
    #log-toolbar button.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    #log-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #e2e8f0;
    }
    .log-entry {
      margin-bottom: 12px;
      border-left: 3px solid #334155;
      padding-left: 10px;
    }
    .log-entry.success { border-left-color: #4ade80; }
    .log-entry.error { border-left-color: #f87171; }
    .log-entry.info { border-left-color: #60a5fa; }
    .log-ts { font-size: 10px; color: #64748b; }
    .log-method { font-size: 13px; font-weight: 600; color: #c4b5fd; margin: 2px 0; }
    .log-latency { font-size: 10px; color: #94a3b8; }
    .log-json {
      background: #0f172a;
      border-radius: 4px;
      padding: 6px 8px;
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 11px;
      color: #a8d8a8;
    }
    .log-json.err-json { color: #fca5a5; }
    .log-empty {
      color: #475569;
      font-style: italic;
      padding: 20px 0;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- Sticky Header: Device Indicator -->
<div id="header">
  <div id="conn-dot"></div>
  <h1>D'CENT Connector v2 Playground</h1>
  <span id="device-info">Not connected</span>
  <button id="btn-connect">Connect</button>
  <button id="btn-disconnect">Disconnect</button>
</div>

<!-- Main: Sidebar + Log -->
<div id="main">

  <!-- Left Sidebar -->
  <div id="sidebar">
    <!-- Tree -->
    <div id="tree-panel"></div>

    <!-- Form (B1 pattern) -->
    <div id="form-panel">
      <h3 id="form-title">Select a method</h3>
      <div id="form-fields"></div>
      <button id="btn-send" disabled>Send</button>
    </div>
  </div>

  <!-- Right: Log Panel -->
  <div id="log-area">
    <div id="log-toolbar">
      <span>Request Log</span>
      <button id="btn-pause">Pause</button>
      <button id="btn-clear">Clear</button>
      <button id="btn-copy">Copy all</button>
    </div>
    <div id="log-scroll">
      <div class="log-empty" id="log-empty">No requests yet. Connect and select a method to start.</div>
    </div>
  </div>

</div>

<!-- v2 dist bundle (libraryTarget: 'this' → window globals) -->
<script src="/dist/v2/dcent-web-connector.min.js"></script>
<script src="/playground.js"></script>
</body>
</html>
